<div class="container d-flex align-items-center justify-content-center" style="height:90vh;">

<div class="login-box">

<div class="login-card text-center">

<h2 class="mb-4">Giriş Yap</h2>

<form action="login.php" method="POST" onsubmit="return kontrol()">

<input class="form-control mb-3" id="email" name="email" placeholder="Mail">

<input class="form-control mb-3" id="password" name="password" type="password" placeholder="Şifre">

<button class="btn btn-primary w-100">Giriş</button>

</form>

</div>

</div>

</div>

<script>
function kontrol(){

let email = document.getElementById("email").value.trim();
let pass = document.getElementById("password").value.trim();

if(email === "" || pass === ""){
alert("Boş alan bırakma");
return false;
}

if(!email.includes("@")){
alert("Email hatalı");
return false;
}

return true;
}

// 🔥 ENTER ile giriş
document.addEventListener("keypress", function(e){
if(e.key === "Enter"){
kontrol();
}
});
</script>
