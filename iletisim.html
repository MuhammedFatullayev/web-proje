<div class="container mt-5">

<div class="card form-box p-4 shadow">

<h2 class="text-center mb-4">İletişim</h2>

<form action="iletisim.php" method="POST" onsubmit="return jsKontrol()">

<input class="form-control mb-3" id="name" name="name" placeholder="Ad">

<input class="form-control mb-3" id="email" name="email" placeholder="Email">

<input class="form-control mb-3" id="phone" name="phone" placeholder="Telefon">

<select name="sehir" class="form-control mb-3">
<option>Bakü</option>
<option>İstanbul</option>
</select>

<div class="d-flex gap-2">
<button type="button" class="btn btn-warning w-50" onclick="jsKontrol()">JS Kontrol</button>
<button type="button" class="btn btn-success w-50" onclick="vueKontrol()">Vue Kontrol</button>
</div>

<button type="submit" class="btn btn-primary w-100 mt-3">Gönder</button>

</form>

</div>

</div>

<!-- VUE (GÖRÜNMEZ) -->
<div id="app" style="display:none;">
<input v-model="email">
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

<script>
// JS KONTROL
function jsKontrol(){

let name = document.getElementById("name").value.trim();
let email = document.getElementById("email").value.trim();
let phone = document.getElementById("phone").value.trim();

if(name === ""){
alert("Ad boş");
return false;
}

if(!email.includes("@")){
alert("Email hatalı");
return false;
}

if(phone === "" || isNaN(phone)){
alert("Telefon sadece sayı olmalı");
return false;
}

alert("JS kontrol başarılı");
return true;
}

// VUE KONTROL
function vueKontrol(){

let email = document.getElementById("email").value.trim();

if(email === ""){
alert("Vue: boş olamaz");
}
else if(!email.includes("@")){
alert("Vue: email hatalı");
}
else{
alert("Vue kontrol başarılı");
}
}

// Vue instance
new Vue({
el:"#app",
data:{ email:"" }
});
</script>

<!-- 🔥 SCRIPT EKLENDİ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
