  height: 300px;
  object-fit: cover;
  border-radius: 10px;

  transition: 0.3s;

.movie-card:hover {
  transform: scale(1.05);
}

.loader {
  display: none;
  text-align: center;
  font-size: 20px;
  margin-top: 20px;
}

body {
  background: #f5f5f5;
}
</style>

<div class="container mt-5">

<h2 class="text-center mb-4">🎬 Film Ara</h2>

<div class="search-box text-center">
<input id="search" class="form-control mb-3" placeholder="Film adı gir">
<button onclick="ara()" class="btn btn-primary w-100">Ara</button>
</div>

<div id="loader" class="loader">Yükleniyor...</div>

<div class="row mt-4" id="films"></div>

</div>

<script>
function ara(){

let s = document.getElementById("search").value.trim();

if(s === ""){
alert("Film adı gir");
return;
}

document.getElementById("loader").style.display = "block";
document.getElementById("films").innerHTML = "";

fetch(`https://www.omdbapi.com/?s=${s}&apikey=KEY`)
.then(r => r.json())
.then(d => {

document.getElementById("loader").style.display = "none";

if(!d.Search){
document.getElementById("films").innerHTML = "<p class='text-center'>Film bulunamadı</p>";
return;
}

d.Search.forEach(f => {

let poster = f.Poster !== "N/A" ? f.Poster : "https://via.placeholder.com/300x400";

document.getElementById("films").innerHTML += `
<div class="col-md-3 mb-4">
  <div class="card movie-card shadow">
    <img src="${poster}">
    <div class="card-body text-center">
      <h6>${f.Title}</h6>
      <p>${f.Year}</p>
    </div>
  </div>
</div>
`;

});

})
.catch(()=>{
document.getElementById("loader").style.display = "none";
document.getElementById("films").innerHTML = "<p class='text-center'>Hata oluştu</p>";
});
}

// 🔥 ENTER ile arama
document.getElementById("search").addEventListener("keypress", function(e){
if(e.key === "Enter"){
ara();
}
});
</script>

<!-- 🔥 SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

</body>
